<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Driver Tracking</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0854A0;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Status card */
    #statusCard {
      width: 100%;
      background-color: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 32px 24px;
      text-align: center;
      display: none;
    }

    #statusIcon {
      font-size: 56px;
      margin-bottom: 12px;
      line-height: 1;
    }

    #statusText {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    #truckLabel {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 0;
    }

    #gpsWarning {
      margin-top: 14px;
      font-size: 14px;
      color: #FFD700;
      display: none;
    }

    /* Confirm button */
    #confirmBtn {
      display: none;
      width: 100%;
      min-height: 56px;
      background-color: #ffffff;
      color: #0854A0;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }

    #confirmBtn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #confirmBtn:not(:disabled):active {
      opacity: 0.8;
    }

    /* Message screen (error / completion) */
    #messageScreen {
      width: 100%;
      background-color: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      display: none;
    }

    #messageIcon {
      font-size: 48px;
      margin-bottom: 16px;
      line-height: 1;
    }

    #messageText {
      font-size: 17px;
      line-height: 1.5;
      opacity: 0.95;
    }

    /* Loading state */
    #loadingScreen {
      text-align: center;
    }

    #loadingIcon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: spin 2s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #loadingText {
      font-size: 16px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- Loading screen (shown while fetching assignment) -->
    <div id="loadingScreen">
      <div id="loadingIcon">⏳</div>
      <div id="loadingText">Loading assignment…</div>
    </div>

    <!-- Status card (shown when tracking is active) -->
    <div id="statusCard">
      <div id="statusIcon">🚚</div>
      <div id="statusText">Tracking active</div>
      <div id="truckLabel">Truck: —</div>
      <div id="gpsWarning">⚠️ Location access required. Please enable GPS.</div>
    </div>

    <!-- Confirm Delivery button -->
    <button id="confirmBtn">Confirm Delivery</button>

    <!-- Simulate GPS button (for local testing on desktop) -->
    <button id="simGpsBtn" style="display:none;background:#1a6bc4;color:#fff;border:2px dashed #7ab8ff;border-radius:12px;padding:16px 32px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;width:100%;max-width:480px;">
      📍 Simulate GPS (testing)
    </button>

    <!-- Error / completion screen -->
    <div id="messageScreen">
      <div id="messageIcon">ℹ️</div>
      <p id="messageText"></p>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      // ── Module-level state ───────────────────────────────────────────────
      var _latestPosition = null;
      var _delivered = false;
      var _watchId = null;
      var _intervalId = null;
      var _assignmentId = null;

      // ── DOM refs ─────────────────────────────────────────────────────────
      var loadingScreen = document.getElementById('loadingScreen');
      var statusCard    = document.getElementById('statusCard');
      var truckLabel    = document.getElementById('truckLabel');
      var gpsWarning    = document.getElementById('gpsWarning');
      var confirmBtn    = document.getElementById('confirmBtn');
      var simGpsBtn     = document.getElementById('simGpsBtn');
      var messageScreen = document.getElementById('messageScreen');
      var messageIcon   = document.getElementById('messageIcon');
      var messageText   = document.getElementById('messageText');

      // ── Helpers ──────────────────────────────────────────────────────────
      function showMessage(icon, text) {
        loadingScreen.style.display = 'none';
        statusCard.style.display    = 'none';
        confirmBtn.style.display    = 'none';
        messageIcon.textContent     = icon;
        messageText.textContent     = text;
        messageScreen.style.display = 'block';
      }

      function showTracking(label) {
        loadingScreen.style.display = 'none';
        truckLabel.textContent      = 'Truck: ' + label;
        statusCard.style.display    = 'block';
        confirmBtn.style.display    = 'block';
      }

      // ── GPS callbacks ────────────────────────────────────────────────────
      function onPosition(position) {
        _latestPosition = position.coords;
        gpsWarning.style.display = 'none';
      }

      function onGpsError() {
        gpsWarning.style.display = 'block';
        simGpsBtn.style.display  = 'block';
      }

      // ── Simulate GPS (for desktop/local testing) ──────────────────────
      simGpsBtn.addEventListener('click', function () {
        // Simulate a position near Bangalore, India with slight random offset
        var baseLat = 12.9716 + (Math.random() - 0.5) * 0.01;
        var baseLng = 77.5946 + (Math.random() - 0.5) * 0.01;
        _latestPosition = { latitude: baseLat, longitude: baseLng, speed: 40, accuracy: 10 };
        gpsWarning.style.display = 'none';
        simGpsBtn.textContent    = '📍 GPS simulated (' + baseLat.toFixed(4) + ', ' + baseLng.toFixed(4) + ')';
        sendLocation();
      });

      // ── Periodic location update (every 30 s) ────────────────────────────
      function sendLocation() {
        if (!_latestPosition || _delivered) return;

        fetch('/odata/v4/tracking/updateLocation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assignmentId: _assignmentId,
            latitude:     _latestPosition.latitude,
            longitude:    _latestPosition.longitude,
            speed:        _latestPosition.speed    || null,
            accuracy:     _latestPosition.accuracy || null
          })
        }).catch(function () {
          // Silent — location updates are best-effort; GPS warning is already visible if needed
        });
      }

      // ── Confirm Delivery ─────────────────────────────────────────────────
      confirmBtn.addEventListener('click', function () {
        if (_delivered) return;
        confirmBtn.disabled = true;

        fetch('/odata/v4/tracking/confirmDelivery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assignmentId: _assignmentId })
        })
          .then(function (res) {
            if (!res.ok) {
              return res.text().then(function (t) { throw new Error(t || res.status); });
            }
            return res;
          })
          .then(function () {
            _delivered = true;

            // Stop tracking
            if (_intervalId !== null) { clearInterval(_intervalId); _intervalId = null; }
            if (_watchId    !== null) { navigator.geolocation.clearWatch(_watchId); _watchId = null; }

            showMessage('✅', 'Delivery Complete — Thank you. You can close this page.');
          })
          .catch(function (err) {
            confirmBtn.disabled = false;
            // Show transient error inline without alert()
            var prev = messageText.textContent;
            messageText.textContent = 'Could not confirm delivery: ' + (err.message || err);
            messageScreen.style.display = 'block';
            setTimeout(function () {
              messageScreen.style.display = 'none';
              messageText.textContent = prev;
            }, 4000);
          });
      });

      // ── Bootstrap ────────────────────────────────────────────────────────
      function init() {
        // 1. Read assignmentId from hash
        _assignmentId = window.location.hash.slice(1);
        if (!_assignmentId) {
          showMessage('❌', 'Invalid tracking link. Please scan the QR code again.');
          return;
        }

        // 2. Fetch assignment
        fetch('/odata/v4/tracking/DriverAssignment(' + encodeURIComponent("'" + _assignmentId + "'") + ')', {
          headers: {
            'Authorization': 'Basic YWxpY2U6YWxpY2U='
          }
        })
          .then(function (res) {
            if (res.status === 404) {
              showMessage('📦', 'This delivery is already completed.');
              return null;
            }
            if (!res.ok) {
              return res.text().then(function (t) { throw new Error(t || res.status); });
            }
            return res.json();
          })
          .then(function (data) {
            if (!data) return; // 404 handled above

            var assignment = data;

            // Check if already delivered
            if (!assignment || assignment.Status === 'DELIVERED') {
              showMessage('📦', 'This delivery is already completed.');
              return;
            }

            // 3. Show tracking UI
            var label = assignment.TruckRegistration || assignment.MobileNumber || _assignmentId;
            showTracking(label);

            // 4. Request wake lock
            if (navigator.wakeLock) {
              navigator.wakeLock.request('screen').catch(function () {});
            }

            // 5. Start GPS
            if (navigator.geolocation) {
              _watchId = navigator.geolocation.watchPosition(onPosition, onGpsError, {
                enableHighAccuracy: true
              });
            } else {
              onGpsError();
            }

            // 6. Start 30-second send interval
            _intervalId = setInterval(sendLocation, 30000);
          })
          .catch(function (err) {
            showMessage('⚠️', 'Could not load assignment: ' + (err.message || 'Unknown error'));
          });
      }

      init();
    }());
  </script>
</body>
</html>
