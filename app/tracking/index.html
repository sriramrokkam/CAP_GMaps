<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Driver Tracking</title>
    <script id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.144.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ui.layout, sap.f"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-onInit="onInit"
        data-sap-ui-resourceroots='{ "tracking": "./" }'>
    </script>
    <style>
        body { margin: 0; padding: 0; }
        .driverPage { min-height: 100vh; }
        .detailRow { display: flex; justify-content: space-between; padding: 4px 0; }
        .detailLabel { color: #6a6d70; font-size: 13px; }
        .detailValue { font-weight: 600; font-size: 13px; text-align: right; max-width: 60%; }
        .gpsCoordBox { background: #f5f6f7; border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-family: monospace; font-size: 13px; }
        .stepItem { border-bottom: 1px solid #e8e8e8; padding: 8px 0; }
        .stepInstruction { font-size: 13px; }
        .stepMeta { font-size: 12px; color: #6a6d70; margin-top: 2px; }
    </style>
    <script>
        function onInit() {
            sap.ui.require([
                "sap/m/App", "sap/m/Page", "sap/m/Panel", "sap/m/VBox", "sap/m/HBox",
                "sap/m/Text", "sap/m/Title", "sap/m/Label", "sap/m/Button",
                "sap/m/ObjectStatus", "sap/m/ObjectHeader", "sap/m/ObjectAttribute",
                "sap/m/IconTabBar", "sap/m/IconTabFilter", "sap/m/List", "sap/m/StandardListItem",
                "sap/m/MessageToast", "sap/m/MessageBox", "sap/m/BusyIndicator",
                "sap/m/FlexBox", "sap/ui/core/Icon", "sap/ui/core/HTML",
                "sap/m/MessageStrip"
            ], function (App, Page, Panel, VBox, HBox, Text, Title, Label, Button,
                         ObjectStatus, ObjectHeader, ObjectAttribute,
                         IconTabBar, IconTabFilter, List, StandardListItem,
                         MessageToast, MessageBox, BusyIndicator,
                         FlexBox, Icon, HTML, MessageStrip) {

                // ── State ──
                var _assignmentId = window.location.hash.slice(1);
                var _assignment = null;
                var _latestPosition = null;
                var _delivered = false;
                var _watchId = null;
                var _intervalId = null;
                var _gpsCount = 0;

                // ── GPS coordinate display ──
                var gpsText = new Text({ text: "Waiting for GPS..." });
                var gpsSendCount = new Text({ text: "" });

                // ── Delivery info fields ──
                var deliveryDocText = new Text({ text: "—" });
                var customerText = new Text({ text: "—" });
                var addressFromText = new Text({ text: "—" });
                var addressToText = new Text({ text: "—" });
                var distanceText = new Text({ text: "—" });
                var durationText = new Text({ text: "—" });
                var assignedAtText = new Text({ text: "—" });
                var statusBadge = new ObjectStatus({ text: "Loading...", state: "Information" });

                // ── Directions list ──
                var directionsList = new List({
                    noDataText: "No directions available",
                    showSeparators: "Inner"
                });

                // ── Object Header ──
                var objHeader = new ObjectHeader({
                    title: "Loading...",
                    icon: "sap-icon://shipping-status",
                    responsive: true,
                    fullScreenOptimized: true,
                    statuses: [statusBadge]
                });

                // ── GPS Warning ──
                var gpsWarning = new MessageStrip({
                    text: "Location access required. Please enable GPS or use Simulate GPS below.",
                    type: "Warning",
                    showIcon: true,
                    visible: false
                });

                // ── Simulate GPS Button ──
                var simGpsBtn = new Button({
                    text: "Simulate GPS (Testing)",
                    icon: "sap-icon://locate-me",
                    type: "Emphasized",
                    visible: false,
                    press: function () {
                        var lat = 12.9716 + (Math.random() - 0.5) * 0.02;
                        var lng = 77.5946 + (Math.random() - 0.5) * 0.02;
                        _latestPosition = { latitude: lat, longitude: lng, speed: 35 + Math.random() * 20, accuracy: 8 };
                        updateGpsDisplay();
                        gpsWarning.setVisible(false);
                        sendLocation();
                        MessageToast.show("GPS simulated: " + lat.toFixed(4) + ", " + lng.toFixed(4));
                    }
                });

                // ── Confirm Delivery Button ──
                var confirmBtn = new Button({
                    text: "Confirm Delivery",
                    icon: "sap-icon://complete",
                    type: "Accept",
                    width: "100%",
                    visible: false,
                    press: function () {
                        MessageBox.confirm("Mark this delivery as completed?", {
                            title: "Confirm Delivery",
                            onClose: function (action) {
                                if (action !== MessageBox.Action.OK) return;
                                confirmBtn.setEnabled(false);
                                fetch("/odata/v4/tracking/confirmDelivery", {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ assignmentId: _assignmentId })
                                }).then(function (r) {
                                    if (!r.ok) throw new Error("Failed");
                                    _delivered = true;
                                    if (_intervalId) { clearInterval(_intervalId); _intervalId = null; }
                                    if (_watchId) { navigator.geolocation.clearWatch(_watchId); _watchId = null; }
                                    statusBadge.setText("DELIVERED");
                                    statusBadge.setState("Success");
                                    confirmBtn.setVisible(false);
                                    simGpsBtn.setVisible(false);
                                    gpsWarning.setVisible(false);
                                    completionPanel.setVisible(true);
                                }).catch(function () {
                                    confirmBtn.setEnabled(true);
                                    MessageToast.show("Failed to confirm delivery. Please try again.");
                                });
                            }
                        });
                    }
                });

                // ── Completion panel ──
                var completionPanel = new Panel({
                    visible: false,
                    content: [
                        new VBox({
                            alignItems: "Center",
                            items: [
                                new Icon({ src: "sap-icon://message-success", size: "3rem", color: "#2b7c2b" }),
                                new Title({ text: "Delivery Complete", level: "H3" }).addStyleClass("sapUiSmallMarginTop"),
                                new Text({ text: "Thank you! You can close this page." }).addStyleClass("sapUiTinyMarginTop")
                            ]
                        }).addStyleClass("sapUiMediumMargin")
                    ]
                });

                // Helper to build a detail row
                function detailRow(label, valueCtrl) {
                    return new HBox({
                        justifyContent: "SpaceBetween",
                        width: "100%",
                        items: [
                            new Label({ text: label }).addStyleClass("detailLabel"),
                            valueCtrl
                        ]
                    }).addStyleClass("sapUiTinyMarginTopBottom");
                }

                // ── Build Page ──
                var page = new Page({
                    showHeader: false,
                    backgroundDesign: "Solid",
                    content: [
                        objHeader,

                        // Delivery Details Panel
                        new Panel({
                            headerText: "Delivery Details",
                            expandable: false,
                            content: [
                                new VBox({
                                    items: [
                                        detailRow("Delivery", deliveryDocText),
                                        detailRow("Customer", customerText),
                                        detailRow("From", addressFromText),
                                        detailRow("To", addressToText),
                                        detailRow("Distance", distanceText),
                                        detailRow("Duration", durationText),
                                        detailRow("Assigned", assignedAtText)
                                    ]
                                }).addStyleClass("sapUiSmallMarginBeginEnd")
                            ]
                        }).addStyleClass("sapUiTinyMarginTop"),

                        // GPS & Tracking Panel
                        new Panel({
                            headerText: "GPS Tracking",
                            expandable: false,
                            content: [
                                new VBox({
                                    items: [
                                        gpsWarning,
                                        new VBox({
                                            items: [gpsText, gpsSendCount]
                                        }).addStyleClass("gpsCoordBox"),
                                        new HBox({
                                            justifyContent: "Center",
                                            items: [simGpsBtn]
                                        }).addStyleClass("sapUiSmallMarginTop")
                                    ]
                                }).addStyleClass("sapUiSmallMarginBeginEnd")
                            ]
                        }).addStyleClass("sapUiTinyMarginTop"),

                        // Directions Panel (collapsible)
                        new Panel({
                            headerText: "Turn-by-Turn Directions",
                            expandable: true,
                            expanded: false,
                            content: [directionsList]
                        }).addStyleClass("sapUiTinyMarginTop"),

                        // Actions
                        new VBox({
                            items: [confirmBtn, completionPanel]
                        }).addStyleClass("sapUiMediumMargin")
                    ]
                });

                var app = new App({ pages: [page] });
                app.placeAt("content");

                // ── GPS functions ──
                function updateGpsDisplay() {
                    if (!_latestPosition) return;
                    var lat = _latestPosition.latitude.toFixed(6);
                    var lng = _latestPosition.longitude.toFixed(6);
                    var spd = _latestPosition.speed ? (_latestPosition.speed * 3.6).toFixed(0) + " km/h" : "—";
                    gpsText.setText("Lat: " + lat + "  |  Lng: " + lng + "  |  Speed: " + spd);
                }

                function onPosition(position) {
                    _latestPosition = position.coords;
                    updateGpsDisplay();
                    gpsWarning.setVisible(false);
                }

                function onGpsError() {
                    gpsWarning.setVisible(true);
                    simGpsBtn.setVisible(true);
                }

                function sendLocation() {
                    if (!_latestPosition || _delivered) return;
                    _gpsCount++;
                    gpsSendCount.setText("Updates sent: " + _gpsCount + "  |  Last: " + new Date().toLocaleTimeString());

                    fetch("/odata/v4/tracking/updateLocation", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            assignmentId: _assignmentId,
                            latitude: _latestPosition.latitude,
                            longitude: _latestPosition.longitude,
                            speed: _latestPosition.speed || null,
                            accuracy: _latestPosition.accuracy || null
                        })
                    }).catch(function () {});
                }

                // ── Format date ──
                function fmtDate(iso) {
                    if (!iso) return "—";
                    var d = new Date(iso);
                    return d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
                }

                // ── Fetch delivery details from EWM ──
                function loadDeliveryDetails(deliveryDoc) {
                    fetch("/odata/v4/ewm/OutboundDeliveries('" + deliveryDoc + "')", {
                        headers: { "Authorization": "Basic YWxpY2U6YWxpY2U=" }
                    }).then(function (r) { return r.ok ? r.json() : null; })
                      .then(function (del) {
                        if (!del) return;
                        customerText.setText(del.ShipToParty || "—");
                    }).catch(function () {});
                }

                // ── Fetch route directions ──
                function loadDirections(deliveryDoc) {
                    // Get the latest route for this delivery from RouteDirections
                    fetch("/odata/v4/gmaps/RouteDirections?$orderby=createdAt desc&$top=1&$expand=steps($orderby=stepNumber asc)", {
                        headers: { "Authorization": "Basic YWxpY2U6YWxpY2U=" }
                    }).then(function (r) { return r.ok ? r.json() : null; })
                      .then(function (data) {
                        if (!data || !data.value || !data.value[0]) return;
                        var dir = data.value[0];

                        addressFromText.setText(dir.origin || "—");
                        addressToText.setText(dir.destination || "—");
                        distanceText.setText(dir.distance || "—");
                        durationText.setText(dir.duration || "—");

                        // Populate directions list
                        var steps = dir.steps || [];
                        directionsList.destroyItems();
                        steps.forEach(function (step) {
                            directionsList.addItem(new StandardListItem({
                                title: step.instruction,
                                description: step.distance + " — " + step.duration,
                                icon: "sap-icon://navigation-right-arrow",
                                info: "Step " + step.stepNumber,
                                infoState: "None"
                            }));
                        });
                    }).catch(function () {});
                }

                // ── Bootstrap ──
                function init() {
                    if (!_assignmentId) {
                        objHeader.setTitle("Invalid Link");
                        statusBadge.setText("ERROR");
                        statusBadge.setState("Error");
                        return;
                    }

                    // Fetch assignment
                    fetch("/odata/v4/tracking/DriverAssignment('" + _assignmentId + "')", {
                        headers: { "Authorization": "Basic YWxpY2U6YWxpY2U=" }
                    }).then(function (r) {
                        if (!r.ok) throw new Error(r.status);
                        return r.json();
                    }).then(function (assignment) {
                        _assignment = assignment;

                        if (assignment.Status === "DELIVERED") {
                            objHeader.setTitle("Delivery " + assignment.DeliveryDocument);
                            statusBadge.setText("DELIVERED");
                            statusBadge.setState("Success");
                            completionPanel.setVisible(true);
                            return;
                        }

                        // Populate header
                        var label = assignment.TruckRegistration || assignment.MobileNumber;
                        objHeader.setTitle("Delivery " + assignment.DeliveryDocument);
                        objHeader.setNumber(label);
                        objHeader.setNumberUnit("Truck / Driver");

                        statusBadge.setText(assignment.Status);
                        statusBadge.setState(assignment.Status === "IN_TRANSIT" ? "Warning" : "Information");

                        // Populate details
                        deliveryDocText.setText(assignment.DeliveryDocument);
                        assignedAtText.setText(fmtDate(assignment.AssignedAt));
                        distanceText.setText(assignment.EstimatedDistance || "—");
                        durationText.setText(assignment.EstimatedDuration || "—");

                        confirmBtn.setVisible(true);

                        // Load extra details
                        loadDeliveryDetails(assignment.DeliveryDocument);
                        loadDirections(assignment.DeliveryDocument);

                        // Start GPS
                        if (navigator.geolocation) {
                            _watchId = navigator.geolocation.watchPosition(onPosition, onGpsError, {
                                enableHighAccuracy: true
                            });
                        } else {
                            onGpsError();
                        }
                        _intervalId = setInterval(sendLocation, 30000);

                        // Wake lock
                        if (navigator.wakeLock) {
                            navigator.wakeLock.request("screen").catch(function () {});
                        }
                    }).catch(function (err) {
                        objHeader.setTitle("Error");
                        statusBadge.setText("NOT FOUND");
                        statusBadge.setState("Error");
                    });
                }

                init();
            });
        }
    </script>
</head>
<body class="sapUiBody">
    <div id="content"></div>
</body>
</html>
